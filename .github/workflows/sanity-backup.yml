name: Daily Sanity Backup

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Sanity CLI
        run: npm install -g @sanity/cli

      - name: Export Sanity Dataset
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
        run: |
          # Create backups directory
          mkdir -p backups
          
          # Generate filename with timestamp
          TIMESTAMP=$(date +%Y-%m-%d_%H-%M-%S)
          FILENAME="sanity-backup-$TIMESTAMP.tar.gz"
          
          # Export dataset (defaulting to 'production')
          sanity dataset export production "backups/$FILENAME" --project-id ${{ secrets.SANITY_PROJECT_ID }} --dataset production

          echo "BACKUP_FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 cp "backups/${{ env.BACKUP_FILENAME }}" "s3://${{ secrets.AWS_BUCKET_NAME }}/sanity-backups/${{ env.BACKUP_FILENAME }}"
