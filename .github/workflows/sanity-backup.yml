name: Sanity Backup

on:
  schedule:
    - cron: '0 3 * * 1' # Every Monday at 03:00 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ceo-magazine
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Export Sanity dataset (production)
        id: export
        env:
          SANITY_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
        run: |
          FILE="exports/backups/$(date -u +'%Y-%m-%d-%H%M')-production.tar.gz"
          mkdir -p exports/backups
          npx --yes sanity@latest dataset export production "$FILE" --yes --token "$SANITY_TOKEN"
          echo "file=$FILE" >> "$GITHUB_OUTPUT"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: sanity-backup-${{ github.run_id }}
          path: ${{ steps.export.outputs.file }}
          retention-days: 30

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload backup to S3
        id: s3upload
        env:
          S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          DEST="s3://$S3_BUCKET/sanity-backups/$(basename \"${{ steps.export.outputs.file }}\")"
          echo "Uploading to $DEST"
          aws s3 cp "${{ steps.export.outputs.file }}" "$DEST" --sse AES256
          echo "s3_url=$DEST" >> "$GITHUB_OUTPUT"

      - name: Notify Slack (optional)
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          S3_URL: ${{ steps.s3upload.outputs.s3_url }}
        run: |
          MESSAGE="Sanity backup uploaded to S3: $S3_URL"
          PAYLOAD=$(printf '{"text":"%s"}' "$MESSAGE")
          curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
